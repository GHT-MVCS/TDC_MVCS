<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAI ERC - MVCS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0e1a;
      --card:#1b2438;
      --line:rgba(255,255,255,.12);
      --text:#e8eeff;
      --muted:#a8b8d8;
      --blue:#3b82f6;
      --teal:#14b8a6;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:'DM Sans',sans-serif;
      color:var(--text);
      background:
        radial-gradient(ellipse 70% 60% at 10% 10%, rgba(59,130,246,.22) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 90% 90%, rgba(20,184,166,.18) 0%, transparent 72%),
        var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .card{
      width:min(860px,100%);
      background:rgba(27,36,56,.92);
      border:1px solid var(--line);
      border-radius:20px;
      padding:28px;
      box-shadow:0 18px 48px rgba(0,0,0,.45);
    }
    h1{font-family:'Syne',sans-serif;font-size:30px;line-height:1.1;margin-bottom:10px}
    p{color:var(--muted);line-height:1.6}
    .pill{
      display:inline-block;
      font-size:11px;
      letter-spacing:.5px;
      font-weight:700;
      text-transform:uppercase;
      border:1px solid rgba(20,184,166,.45);
      color:var(--teal);
      background:rgba(20,184,166,.12);
      border-radius:999px;
      padding:5px 11px;
      margin-bottom:14px;
    }
    .box{
      margin:20px 0;
      border:1px dashed rgba(255,255,255,.22);
      border-radius:14px;
      padding:16px;
      color:var(--muted);
      font-size:14px;
    }
    .meta{font-size:13px;margin-top:6px;color:#c6d2ec}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .btn{
      border:none;
      border-radius:10px;
      padding:10px 16px;
      cursor:pointer;
      font-weight:700;
      font-family:'DM Sans',sans-serif;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn.primary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  </style>
</head>
<body>
  <main class="card">
    <span class="pill">Módulo separado</span>
    <h1>ERC - EAI 1</h1>
    <p>Especificaciones de la red y la carga.</p>
    <div class="box">
      Punto de partida recomendado para ERC:
      <br>1. Definir campos de captura.
      <br>2. Definir reglas de validación.
      <br>3. Conectar con endpoint/hoja dedicada ERC.
      <div id="session-meta" class="meta"></div>
    </div>
    <div class="actions">
      <a id="back-hub" class="btn primary" href="index.html">Volver a EAI 1</a>
      <a class="btn ghost" href="index.html">Ir al inicio</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user') || '';
    const profile = params.get('profile') || '';
    const meta = document.getElementById('session-meta');
    if (user || profile) {
      meta.textContent = 'Sesion recibida: ' + [profile, user].filter(Boolean).join(' | ');
    }
    const backHub = document.getElementById('back-hub');
    backHub.href = 'index.html?hub=eai&profile=' + encodeURIComponent(profile) + '&user=' + encodeURIComponent(user);
  </script>
</body>
</html>
